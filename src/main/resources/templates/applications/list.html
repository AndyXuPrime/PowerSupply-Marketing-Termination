<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>业务台账</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app-shell">
    <header th:replace="~{fragments/nav :: nav('list')}"></header>

    <main class="page">
        <section class="page-head">
            <div>
                <h1>业务台账</h1>
                <p>管理无表临时用电终止申请、流程状态和费用结清信息。</p>
            </div>
            <div class="toolbar">
                <a class="btn primary" href="#new-form">新增受理</a>
                <a class="btn ghost" href="/applications">刷新</a>
            </div>
        </section>

        <section class="grid-4">
            <div class="stat">
                <div class="label">申请总数</div>
                <div class="value" th:text="${allItems.size()}">0</div>
                <div class="sub">当前数据库内业务记录</div>
            </div>
            <div class="stat">
                <div class="label">待派工</div>
                <div class="value" th:text="${acceptedCount}">0</div>
                <div class="sub">已受理待分配</div>
            </div>
            <div class="stat">
                <div class="label">费用已结清</div>
                <div class="value" th:text="${settledCount}">0</div>
                <div class="sub">进入收尾环节</div>
            </div>
            <div class="stat">
                <div class="label">已归档</div>
                <div class="value" th:text="${archivedCount}">0</div>
                <div class="sub">完成注销归档</div>
            </div>
        </section>

        <div class="alerts">
            <div class="alert success" th:if="${pageMessage}" th:text="${pageMessage}"></div>
            <div class="alert error" th:if="${pageError}" th:text="${pageError}"></div>
        </div>

        <section class="panel">
            <div class="panel-head">
                <h2>检索</h2>
            </div>
            <div class="panel-body">
                <form class="filter-row" method="get" action="/applications">
                    <div class="field">
                        <label>关键字</label>
                        <input name="keyword" placeholder="申请编号、客户名称" th:value="${keyword}">
                    </div>
                    <div class="field">
                        <label>状态</label>
                        <select name="status">
                            <option value="">全部</option>
                            <option th:each="st : ${statuses}"
                                    th:value="${st}"
                                    th:selected="${selectedStatus != null and selectedStatus == st}"
                                    th:text="${st.label}"></option>
                        </select>
                    </div>
                    <div class="toolbar" style="align-self:end;">
                        <button class="btn primary" type="submit">查询</button>
                    </div>
                </form>

                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>申请编号</th>
                            <th>客户名称</th>
                            <th>合同号</th>
                            <th>状态</th>
                            <th>受理时间</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${items}">
                            <td th:text="${item.applicationNo}"></td>
                            <td>
                                <div th:text="${item.customerName}"></div>
                                <div class="muted" th:text="${item.customerAddress}"></div>
                            </td>
                            <td th:text="${item.contractNo}"></td>
                            <td>
                                <span class="status" th:classappend="${item.status.name().toLowerCase()}" th:text="${item.status.label}"></span>
                            </td>
                            <td th:text="${#temporals.format(item.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                            <td>
                                <a class="btn" th:href="@{'/applications/' + ${item.id}}">查看</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(items)}">
                            <td colspan="6" class="muted">暂无记录</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="new-form" class="panel" style="margin-top:18px;">
            <div class="panel-head">
                <h2>新增受理</h2>
            </div>
            <div class="panel-body">
                <form method="post" action="/applications" th:object="${newApplication}">
                    <div class="form-grid">
                        <div class="field">
                            <label>客户名称</label>
                            <input th:field="*{customerName}">
                            <div class="error" th:if="${#fields.hasErrors('customerName')}" th:errors="*{customerName}"></div>
                        </div>
                        <div class="field">
                            <label>联系人</label>
                            <input th:field="*{contactName}">
                        </div>
                        <div class="field">
                            <label>联系电话</label>
                            <input th:field="*{contactPhone}">
                        </div>
                        <div class="field">
                            <label>客户地址</label>
                            <input th:field="*{customerAddress}">
                        </div>
                        <div class="field">
                            <label>行政区</label>
                            <input th:field="*{district}">
                        </div>
                        <div class="field">
                            <label>供电单位</label>
                            <input th:field="*{powerSupplyUnit}">
                        </div>
                        <div class="field">
                            <label>项目名称</label>
                            <input th:field="*{projectName}">
                        </div>
                        <div class="field">
                            <label>项目类型</label>
                            <input th:field="*{projectType}">
                        </div>
                        <div class="field">
                            <label>用电性质</label>
                            <input th:field="*{useNature}">
                        </div>
                        <div class="field">
                            <label>合同号</label>
                            <input th:field="*{contractNo}">
                        </div>
                        <div class="field">
                            <label>证件号码</label>
                            <input th:field="*{identityNo}">
                        </div>
                        <div class="field">
                            <label>申请来源</label>
                            <input th:field="*{applicationSource}">
                        </div>
                        <div class="field">
                            <label>受理区域</label>
                            <input th:field="*{acceptanceRegion}">
                        </div>
                        <div class="field">
                            <label>临时容量（kW）</label>
                            <input th:field="*{contractCapacityKw}" type="number" step="0.01">
                            <div class="error" th:if="${#fields.hasErrors('contractCapacityKw')}" th:errors="*{contractCapacityKw}"></div>
                        </div>
                        <div class="field">
                            <label>预收电费（元）</label>
                            <input th:field="*{prepaidFee}" type="number" step="0.01">
                            <div class="error" th:if="${#fields.hasErrors('prepaidFee')}" th:errors="*{prepaidFee}"></div>
                        </div>
                        <div class="field">
                            <label>约定期限（天）</label>
                            <input th:field="*{agreedDays}" type="number" min="1">
                            <div class="error" th:if="${#fields.hasErrors('agreedDays')}" th:errors="*{agreedDays}"></div>
                        </div>
                        <div class="field">
                            <label>申请终止时间</label>
                            <input th:field="*{requestedTerminationDate}" type="date">
                            <div class="error" th:if="${#fields.hasErrors('requestedTerminationDate')}" th:errors="*{requestedTerminationDate}"></div>
                        </div>
                        <div class="field" style="grid-column:1/-1;">
                            <label>备注</label>
                            <textarea th:field="*{remark}"></textarea>
                        </div>
                    </div>
                    <div class="toolbar" style="margin-top:16px;">
                        <button class="btn primary" type="submit">保存受理</button>
                    </div>
                </form>
            </div>
        </section>
    </main>
</div>
</body>
</html>
