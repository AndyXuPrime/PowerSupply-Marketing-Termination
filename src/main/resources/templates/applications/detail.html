<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>申请详情</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app-shell">
    <header th:replace="fragments/nav :: nav('list')"></header>

    <main class="page">
        <section class="page-head">
            <div>
                <h1 th:text="${application.customerName}">申请详情</h1>
                <p>
                    <span th:text="${application.applicationNo}"></span>
                    <span class="muted"> · </span>
                    <span th:text="${application.status.label}"></span>
                </p>
            </div>
            <div class="toolbar">
                <a class="btn ghost" href="/applications">返回列表</a>
            </div>
        </section>

        <div class="alerts">
            <div class="alert success" th:if="${pageMessage}" th:text="${pageMessage}"></div>
            <div class="alert error" th:if="${pageError}" th:text="${pageError}"></div>
        </div>

        <section class="detail-grid">
            <div class="panel">
                <div class="panel-head">
                    <h2>基本信息</h2>
                    <span class="status" th:classappend="${application.status.name().toLowerCase()}" th:text="${application.status.label}"></span>
                </div>
                <div class="panel-body">
                    <div class="meta-list">
                        <div class="meta"><div class="k">申请编号</div><div class="v" th:text="${application.applicationNo}"></div></div>
                        <div class="meta"><div class="k">客户编号</div><div class="v" th:text="${application.customerNo}"></div></div>
                        <div class="meta"><div class="k">联系人</div><div class="v" th:text="${application.contactName}"></div></div>
                        <div class="meta"><div class="k">联系电话</div><div class="v" th:text="${application.contactPhone}"></div></div>
                        <div class="meta"><div class="k">客户地址</div><div class="v" th:text="${application.customerAddress}"></div></div>
                        <div class="meta"><div class="k">供电单位</div><div class="v" th:text="${application.powerSupplyUnit}"></div></div>
                        <div class="meta"><div class="k">项目名称</div><div class="v" th:text="${application.projectName}"></div></div>
                        <div class="meta"><div class="k">合同号</div><div class="v" th:text="${application.contractNo}"></div></div>
                        <div class="meta"><div class="k">约定期限</div><div class="v" th:text="${application.agreedDays + ' 天'}"></div></div>
                        <div class="meta"><div class="k">预收电费</div><div class="v" th:text="${#numbers.formatDecimal(application.prepaidFee, 1, 'COMMA', 2, 'POINT')}"></div></div>
                        <div class="meta"><div class="k">实际使用天数</div><div class="v" th:text="${application.actualDays == null ? '-' : application.actualDays}"></div></div>
                        <div class="meta"><div class="k">申请终止时间</div><div class="v" th:text="${#temporals.format(application.requestedTerminationDate, 'yyyy-MM-dd')}"></div></div>
                    </div>

                    <div style="margin-top:14px;" class="meta">
                        <div class="k">备注 / 归档说明</div>
                        <div class="v" th:text="${application.remark}"></div>
                    </div>
                    <div style="margin-top:14px;" class="meta">
                        <div class="k">费用说明</div>
                        <div class="v" th:text="${application.feeRemark}"></div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-head">
                    <h2>流程时间线</h2>
                </div>
                <div class="panel-body">
                    <div class="timeline">
                        <div class="timeline-item"
                             th:each="st : ${statuses}"
                             th:classappend="${st == application.status} ? ' now' : (${st.ordinal() < application.status.ordinal()} ? ' done' : '')">
                            <div class="timeline-dot"></div>
                            <div>
                                <div class="title" th:text="${st.label}"></div>
                                <div class="desc" th:text="${st.name()}"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="panel" style="margin-top:18px;">
            <div class="panel-head">
                <h2>环节操作</h2>
            </div>
            <div class="panel-body">
                <div class="action-grid">
                    <form class="action-card" th:if="${application.status.name() == 'ACCEPTED'}" method="post" th:action="@{'/applications/' + ${application.id} + '/dispatch'}">
                        <div class="action-head"><h3>勘查派工</h3></div>
                        <div class="action-body">
                            <div class="field">
                                <label>勘查人员</label>
                                <input name="assignedSurveyor" placeholder="例如：张三">
                            </div>
                            <div class="toolbar" style="margin-top:12px;">
                                <button class="btn primary" type="submit">派工</button>
                            </div>
                        </div>
                    </form>

                    <form class="action-card" th:if="${application.status.name() == 'DISPATCHED'}" method="post" th:action="@{'/applications/' + ${application.id} + '/survey'}">
                        <div class="action-head"><h3>现场勘查</h3></div>
                        <div class="action-body">
                            <div class="field">
                                <label>勘查结论</label>
                                <textarea name="surveyResult" placeholder="填写现场核实结果"></textarea>
                            </div>
                            <div class="field" style="margin-top:12px;">
                                <label>客户地址修正</label>
                                <input name="customerAddress" placeholder="如需修正地址可填写">
                            </div>
                            <div class="toolbar" style="margin-top:12px;">
                                <button class="btn primary" type="submit">保存勘查</button>
                            </div>
                        </div>
                    </form>

                    <form class="action-card" th:if="${application.status.name() == 'FIELD_INSPECTED'}" method="post" th:action="@{'/applications/' + ${application.id} + '/contract-terminate'}">
                        <div class="action-head"><h3>终止合同</h3></div>
                        <div class="action-body">
                            <div class="field">
                                <label>合同号</label>
                                <input name="contractNo" th:value="${application.contractNo}">
                            </div>
                            <div class="toolbar" style="margin-top:12px;">
                                <button class="btn primary" type="submit">终止合同</button>
                            </div>
                        </div>
                    </form>

                    <form class="action-card" th:if="${application.status.name() == 'CONTRACT_TERMINATED'}" method="post" th:action="@{'/applications/' + ${application.id} + '/power-off'}">
                        <div class="action-head"><h3>停电</h3></div>
                        <div class="action-body">
                            <div class="toolbar">
                                <button class="btn primary" type="submit">执行停电</button>
                            </div>
                        </div>
                    </form>

                    <form class="action-card" th:if="${application.status.name() == 'POWER_OFF'}" method="post" th:action="@{'/applications/' + ${application.id} + '/determine-fee'}">
                        <div class="action-head"><h3>确定费用</h3></div>
                        <div class="action-body">
                            <div class="field">
                                <label>实际使用天数</label>
                                <input name="actualDays" type="number" step="0.01" th:value="${application.actualDays}">
                            </div>
                            <div class="toolbar" style="margin-top:12px;">
                                <button class="btn primary" type="submit">计算费用</button>
                            </div>
                        </div>
                    </form>

                    <form class="action-card" th:if="${application.status.name() == 'FEE_DETERMINED'}" method="post" th:action="@{'/applications/' + ${application.id} + '/settle-fee'}">
                        <div class="action-head"><h3>结清费用</h3></div>
                        <div class="action-body">
                            <div class="field">
                                <label>收费凭证号</label>
                                <input name="voucherNo">
                            </div>
                            <div class="field" style="margin-top:10px;">
                                <label>结清金额</label>
                                <input name="settledAmount" type="number" step="0.01" th:value="${application.receivableAmount}">
                            </div>
                            <div class="field" style="margin-top:10px;">
                                <label>欠费金额</label>
                                <input name="arrearsAmount" type="number" step="0.01" th:value="${application.arrearsAmount}">
                            </div>
                            <div class="toolbar" style="margin-top:12px;">
                                <button class="btn primary" type="submit">完成结清</button>
                            </div>
                        </div>
                    </form>

                    <form class="action-card" th:if="${application.status.name() == 'FEE_SETTLED'}" method="post" th:action="@{'/applications/' + ${application.id} + '/archive-info'}">
                        <div class="action-head"><h3>信息归档</h3></div>
                        <div class="action-body">
                            <div class="field">
                                <label>档案位置</label>
                                <input name="archiveLocation" placeholder="例如：档案室-A-03">
                            </div>
                            <div class="toolbar" style="margin-top:12px;">
                                <button class="btn primary" type="submit">归档信息</button>
                            </div>
                        </div>
                    </form>

                    <form class="action-card" th:if="${application.status.name() == 'INFO_ARCHIVED'}" method="post" th:action="@{'/applications/' + ${application.id} + '/callback'}">
                        <div class="action-head"><h3>客户回访</h3></div>
                        <div class="action-body">
                            <div class="field">
                                <label>回访结果</label>
                                <textarea name="callbackResult"></textarea>
                            </div>
                            <div class="toolbar" style="margin-top:12px;">
                                <button class="btn primary" type="submit">完成回访</button>
                            </div>
                        </div>
                    </form>

                    <form class="action-card" th:if="${application.status.name() == 'CALLBACK_DONE'}" method="post" th:action="@{'/applications/' + ${application.id} + '/archive'}">
                        <div class="action-head"><h3>归档</h3></div>
                        <div class="action-body">
                            <div class="toolbar">
                                <button class="btn primary" type="submit">完成最终归档</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
